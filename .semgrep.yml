# Semgrep rules for Quantum Vorvex — DevSecOps static analysis
# Run: semgrep --config .semgrep.yml .
# Install: pip install semgrep
# Docs: https://semgrep.dev/docs/writing-rules/overview/

rules:

  # ---------------------------------------------------------------------------
  # Rule 1: Hardcoded secrets — password/secret/token assigned a literal string
  # ---------------------------------------------------------------------------
  - id: hardcoded-secret-literal
    patterns:
      - pattern: |
          const $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)(password|passwd|secret|token|api_key|apikey|auth_key|private_key|access_key|credential)'
      - metavariable-regex:
          metavariable: $VALUE
          # At least 6 chars and not a typical placeholder
          regex: '^(?!.*(<|YOUR_|PLACEHOLDER|EXAMPLE|CHANGEME|xxx|todo))(.{6,})$'
    message: |
      Potential hardcoded secret detected in variable '$VAR'.
      Secrets must not be stored in source code. Use environment variables (process.env.*)
      and ensure .env files are listed in .gitignore.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798
      owasp: A07:2021 - Identification and Authentication Failures
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # Rule 2: eval() called with user-controlled or dynamic input
  # ---------------------------------------------------------------------------
  - id: eval-with-dynamic-input
    patterns:
      - pattern: eval($X)
      - pattern-not: eval("...")
    message: |
      eval() called with a non-literal argument '$X'.
      If '$X' contains any user-controlled data, this is a Remote Code Execution vulnerability.
      Refactor to avoid eval() entirely. Use JSON.parse() for JSON, or restructure the logic.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-95
      owasp: A03:2021 - Injection

  # ---------------------------------------------------------------------------
  # Rule 3: Math.random() used in security-sensitive context
  # ---------------------------------------------------------------------------
  - id: math-random-for-security
    patterns:
      - pattern: Math.random()
    message: |
      Math.random() is not cryptographically secure and must not be used for:
      - Generating tokens, session IDs, or passwords
      - Security decisions or nonces
      - Any context where unpredictability is required
      Use crypto.randomBytes() or crypto.randomUUID() from the Node.js built-in 'crypto' module instead.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-338
      owasp: A02:2021 - Cryptographic Failures

  # ---------------------------------------------------------------------------
  # Rule 4: console.log with potentially sensitive parameter names
  # ---------------------------------------------------------------------------
  - id: console-log-sensitive-data
    patterns:
      - pattern: console.log(..., $SENSITIVE, ...)
      - metavariable-regex:
          metavariable: $SENSITIVE
          regex: '(?i)(password|passwd|token|secret|jwt|auth|credential|key|ssn|dob|idnumber|cardnumber)'
    message: |
      console.log() called with a variable named '$SENSITIVE' which may contain sensitive data.
      Logging credentials, tokens, or PII violates data protection requirements and creates
      security exposure in log files. Remove or redact before shipping to production.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-532
      owasp: A09:2021 - Security Logging and Monitoring Failures

  # ---------------------------------------------------------------------------
  # Rule 5: HTTP URLs used where HTTPS is expected (production code)
  # ---------------------------------------------------------------------------
  - id: http-url-in-source
    patterns:
      - pattern: |
          "$URL"
      - metavariable-regex:
          metavariable: $URL
          regex: '^http://(?!localhost|127\.0\.0\.1|0\.0\.0\.0|::1)'
    message: |
      Plain HTTP URL detected: '$URL'
      All external URLs must use HTTPS to prevent man-in-the-middle attacks and data interception.
      Replace 'http://' with 'https://'. If this is intentional (e.g. a test fixture), add a
      // nosemgrep comment to suppress this finding.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-319
      owasp: A02:2021 - Cryptographic Failures

  # ---------------------------------------------------------------------------
  # Rule 6: SQL string concatenation (raw SQL injection risk)
  # ---------------------------------------------------------------------------
  - id: sql-string-concatenation
    patterns:
      - pattern: |
          $DB.query($A + $B)
      - pattern: |
          $DB.query(`...${$VAR}...`)
      - pattern: |
          $DB.run($A + $B)
      - pattern: |
          $DB.all(`...${$VAR}...`)
    message: |
      Possible SQL injection via string concatenation or template literal in a raw query.
      Use parameterised queries with placeholders (?, $1, named params) instead of
      concatenating user input into SQL strings.
      If using Prisma, use the ORM methods or $queryRaw with Prisma.sql`` tag — never $queryRawUnsafe.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-89
      owasp: A03:2021 - Injection

  # ---------------------------------------------------------------------------
  # Rule 7: Prisma $queryRawUnsafe — unsafe raw SQL
  # ---------------------------------------------------------------------------
  - id: prisma-query-raw-unsafe
    pattern: $PRISMA.$queryRawUnsafe(...)
    message: |
      Prisma.$queryRawUnsafe() called. This bypasses Prisma's parameterisation and is
      vulnerable to SQL injection if any argument contains user input.
      Use $queryRaw with Prisma.sql`` tagged template literals instead, which
      automatically parameterise values.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-89
      owasp: A03:2021 - Injection

  # ---------------------------------------------------------------------------
  # Rule 8: Missing await on async function call (potential unhandled promise)
  # ---------------------------------------------------------------------------
  - id: missing-await-async-call
    patterns:
      - pattern: |
          async function $FUNC(...) {
            ...
            $OBJ.$METHOD(...);
            ...
          }
      - pattern-not: |
          async function $FUNC(...) {
            ...
            await $OBJ.$METHOD(...);
            ...
          }
      - metavariable-regex:
          metavariable: $METHOD
          regex: '^(findMany|findFirst|findUnique|create|update|delete|upsert|count|aggregate|connect|disconnect|save|remove|find|exec|query|run|all)$'
    message: |
      Async ORM/DB method '$OBJ.$METHOD()' called without await.
      Missing await on database operations leads to unhandled promise rejections,
      race conditions, and operations that silently fail without proper error handling.
      Add 'await' before this call or handle the returned Promise explicitly.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: correctness
      cwe: CWE-755
      subcategory: vuln

  # ---------------------------------------------------------------------------
  # Rule 9: Response before return in Express handlers (headers already sent)
  # ---------------------------------------------------------------------------
  - id: express-response-without-return
    patterns:
      - pattern: |
          if (...) {
            $RES.$METHOD(...);
          }
          $NEXT_STATEMENT;
      - metavariable-regex:
          metavariable: $METHOD
          regex: '^(send|json|status|end|redirect)$'
      - pattern-not: |
          if (...) {
            return $RES.$METHOD(...);
          }
    message: |
      Express response method '$RES.$METHOD()' called inside a conditional without 'return'.
      This allows execution to continue after the response is sent, potentially causing
      "Cannot set headers after they are sent" errors or double-response bugs.
      Add 'return' before '$RES.$METHOD(...)'.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: correctness
      cwe: CWE-670
