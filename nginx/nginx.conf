# =============================================================================
# Quantum Vorvex — Production-grade nginx configuration
# Covers: TLS, security headers, rate limiting, gzip, reverse proxy to app
# =============================================================================

# Run as the default unprivileged nginx user
user  nginx;

# auto = one worker per logical CPU core
worker_processes  auto;

# Log errors to stderr so Docker captures them in the container log
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ── Hide nginx version from Server response header ────────────────────────
    server_tokens  off;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Request size limits ───────────────────────────────────────────────────
    # Accommodates hotel image uploads; rejected at nginx before hitting Node
    client_max_body_size  50m;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout    30s;
    client_header_timeout  30s;
    send_timeout           30s;
    keepalive_requests     100;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_min_length    256;
    gzip_buffers       16 8k;
    gzip_http_version  1.1;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/javascript
        text/html
        text/plain
        text/css
        text/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API rate limit: 60 requests/minute per IP (burst of 20)
    limit_req_zone  $binary_remote_addr  zone=general:10m   rate=60r/m;

    # Authentication endpoints: 10 requests/minute per IP (no burst)
    # Mitigates brute-force login attempts
    limit_req_zone  $binary_remote_addr  zone=auth:10m      rate=10r/m;

    # Return 429 Too Many Requests (instead of default 503) on rate limit
    limit_req_status  429;

    # ── Upstream — Node.js app ────────────────────────────────────────────────
    upstream app_backend {
        server app:5000;
        keepalive 32;
    }

    # =========================================================================
    # Server block 1 — HTTP (port 80)
    # Redirect all plain HTTP traffic to HTTPS.
    # =========================================================================
    server {
        listen       80;
        listen  [::]:80;
        server_name  _;

        # ACME challenge for Let's Encrypt cert renewal — must not redirect
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
            allow all;
        }

        # Redirect everything else to HTTPS with a permanent redirect
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Server block 2 — HTTPS (port 443)
    # TLS termination, security headers, rate limiting, reverse proxy.
    # =========================================================================
    server {
        listen       443 ssl http2;
        listen  [::]:443 ssl http2;
        server_name  _;

        # ── TLS certificate paths ─────────────────────────────────────────────
        # Replace with your actual certificate paths.
        # For Let's Encrypt: /etc/letsencrypt/live/<domain>/fullchain.pem
        # For self-signed dev certs: /etc/nginx/certs/cert.pem
        ssl_certificate      /etc/nginx/certs/cert.pem;
        ssl_certificate_key  /etc/nginx/certs/key.pem;

        # ── TLS protocols and ciphers ─────────────────────────────────────────
        # Only modern, secure protocols. TLS 1.0/1.1 explicitly excluded.
        ssl_protocols  TLSv1.2 TLSv1.3;

        # OWASP-recommended cipher list — forward secrecy + AEAD only
        ssl_ciphers  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;

        # ── TLS session tuning ────────────────────────────────────────────────
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # ── OCSP stapling ─────────────────────────────────────────────────────
        ssl_stapling         on;
        ssl_stapling_verify  on;
        resolver             1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout     5s;

        # ── Security headers ──────────────────────────────────────────────────

        # HSTS: tell browsers to always use HTTPS for the next 2 years
        # Remove preload if you haven't submitted to the HSTS preload list
        add_header  Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload"  always;

        # Content Security Policy — tighten per your actual script/style sources
        add_header  Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data: blob:; "
            "font-src 'self'; "
            "connect-src 'self'; "
            "media-src 'self'; "
            "object-src 'none'; "
            "frame-ancestors 'none'; "
            "base-uri 'self'; "
            "form-action 'self'; "
            "upgrade-insecure-requests;"
            always;

        # Prevent this page from being embedded in a frame (clickjacking)
        add_header  X-Frame-Options             "DENY"                              always;

        # Prevent browsers from MIME-sniffing the content-type
        add_header  X-Content-Type-Options      "nosniff"                           always;

        # Control the Referer header sent to external sites
        add_header  Referrer-Policy             "strict-origin-when-cross-origin"   always;

        # Restrict access to browser APIs
        add_header  Permissions-Policy
            "accelerometer=(), "
            "ambient-light-sensor=(), "
            "autoplay=(), "
            "battery=(), "
            "camera=(), "
            "display-capture=(), "
            "document-domain=(), "
            "encrypted-media=(), "
            "execution-while-not-rendered=(), "
            "execution-while-out-of-viewport=(), "
            "fullscreen=(self), "
            "geolocation=(), "
            "gyroscope=(), "
            "keyboard-map=(), "
            "magnetometer=(), "
            "microphone=(), "
            "midi=(), "
            "navigation-override=(), "
            "payment=(), "
            "picture-in-picture=(), "
            "publickey-credentials-get=(), "
            "screen-wake-lock=(), "
            "sync-xhr=(), "
            "usb=(), "
            "web-share=(), "
            "xr-spatial-tracking=()"
            always;

        # Cross-Origin isolation headers
        add_header  Cross-Origin-Opener-Policy    "same-origin"         always;
        add_header  Cross-Origin-Embedder-Policy  "require-corp"        always;
        add_header  Cross-Origin-Resource-Policy  "same-origin"         always;

        # ── Block access to sensitive files ───────────────────────────────────
        location ~ /\.(env|git|htaccess|htpasswd) {
            deny all;
            return 404;
        }

        location ~ /\.git {
            deny all;
            return 404;
        }

        # ── Health check — no rate limiting, no auth required ─────────────────
        location = /health {
            proxy_pass  http://app_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection  "";
            proxy_set_header    Host        $host;
            access_log  off;
        }

        # ── Authentication endpoints — strict rate limiting ───────────────────
        # 10 requests/minute; no burst allowed (nodelay)
        location /api/v1/auth/ {
            limit_req  zone=auth  nodelay;
            limit_req_log_level  warn;

            proxy_pass          http://app_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection          "";
            proxy_set_header    Host                $host;
            proxy_set_header    X-Real-IP           $remote_addr;
            proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto   $scheme;
            proxy_set_header    X-Request-ID        $request_id;

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }

        # ── General API — standard rate limiting ──────────────────────────────
        # 60 requests/minute with a burst of 20 queued (delay excess requests)
        location /api/ {
            limit_req  zone=general  burst=20  delay=10;

            proxy_pass          http://app_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection          "";
            proxy_set_header    Host                $host;
            proxy_set_header    X-Real-IP           $remote_addr;
            proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto   $scheme;
            proxy_set_header    X-Request-ID        $request_id;

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     60s;

            # Buffer tuning for API responses
            proxy_buffering         on;
            proxy_buffers           8 16k;
            proxy_buffer_size       32k;
        }

        # ── All other requests — proxy to app (serves React SPA) ─────────────
        location / {
            limit_req  zone=general  burst=50  delay=20;

            proxy_pass          http://app_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection          "";
            proxy_set_header    Host                $host;
            proxy_set_header    X-Real-IP           $remote_addr;
            proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto   $scheme;
            proxy_set_header    X-Request-ID        $request_id;

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     60s;

            # Cache static assets aggressively
            proxy_cache_bypass  $http_upgrade;
        }

        # ── Custom error pages ────────────────────────────────────────────────
        error_page  404              /404.html;
        error_page  429              /429.html;
        error_page  500 502 503 504  /50x.html;

        location = /50x.html {
            root  /usr/share/nginx/html;
        }
    }
}
